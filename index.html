<html lang="th">
<head>
<meta charset="UTF-8">
<title>Periodic Table</title>
<link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
 h1{
  margin:15px 0;
  font-size:72px;
  color:#2c3e50;
  text-shadow:1px 1px 2px rgba(0,0,0,0.1);
}

.el .sym{
  font-weight:600;
}

.el .name{
  font-weight:300;
}

body{
  font-family: 'Prompt', sans-serif;
  background: linear-gradient(135deg,#f5f7fa,#e4ecf5);
  text-align:center;
  margin:0;
  padding-bottom:40px;
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
}
.periodic{
  background:#ffffffcc;
  padding:15px;
  border-radius:15px;
  box-shadow:0 10px 25px rgba(0,0,0,0.1);

  max-width:100%;
  overflow-x:auto;   /* ถ้าจอเล็ก ให้เลื่อนแทน */
}
h1{margin:10px}
.periodic{
  display:grid;
  grid-template-columns:40px repeat(18,80px);
  gap:6px;
}

.el{
  border:1px solid #333;
  height:95px;
  padding:3px;
  box-sizing:border-box;
  font-size:10px;
  cursor:pointer;
  border-radius:8px;
  transition: transform 0.2s, box-shadow 0.2s;
}
.el:hover{
  transform: scale(1.08);
  box-shadow:0 6px 12px rgba(0,0,0,0.3);
  z-index:5;
}
.el{
  cursor:pointer;
}
.no{font-size:10px;text-align:left}
.sym{font-size:22px;font-weight:bold}
.w{font-size:10px}
.name{font-size:10px}

.alkali{background:#ffb3b3}
.alkaline{background:#ffd9b3}
.transition{background:#ffffb3}
.metalloid{background:#ccffcc}
.nonmetal{background:#b3e5ff}
.halogen{background:#b3ffff}
.noble{background:#e1bee7}
.lanth{background:#f8bbd0}
.actin{background:#d1c4e9}
.post-transition{background:#e2e2e2;}
.label{
  grid-column:1 / span 18;
  text-align:left;
  font-weight:bold;
  margin-top:8px;
}

.modal {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.6);
  justify-content: center;
  align-items: center;
  z-index: 1000;
}

.modal-content{
  background: linear-gradient(135deg,#ffffff,#f0f4ff);
  padding: 20px;
  width: 320px;
  border-radius: 15px;
  text-align: center;
  box-shadow:0 15px 30px rgba(0,0,0,0.3);
  animation: pop 0.25s ease;
}
@keyframes pop{
  from{
    transform: scale(0.7);
    opacity:0;
  }
  to{
    transform: scale(1);
    opacity:1;
  }
}
.close{
  cursor:pointer;
  color:#e74c3c;
  font-size:20px;
}


.close {
  cursor: pointer;
  color: red;
  font-weight: bold;
  float: right;
}

@keyframes pop{
  from{
    transform: scale(0.8);
    opacity: 0;
  }
  to{
    transform: scale(1);
    opacity: 1;
  }
}

.modal-content{
  background: linear-gradient(135deg,#ffffff,#f2f2f2);
  padding: 25px;
  width: 320px;
  border-radius: 16px;
  text-align: center;
  box-shadow: 0 20px 40px rgba(0,0,0,0.3);
  animation: pop 0.3s ease;
}

.modal-content.alkali{background:#ffebee}
.modal-content.alkaline{background:#fff3e0}
.modal-content.transition{background:#fffde7}
.modal-content.metalloid{background:#e8f5e9}
.modal-content.nonmetal{background:#e3f2fd}
.modal-content.halogen{background:#e0f7fa}
.modal-content.noble{background:#f3e5f5}
.modal-content.lanth{background:#fce4ec}
.modal-content.actin{background:#ede7f6}
.modal-content.actin{background:#e2e2e2}
.modal-content p{
  text-align:left;
  margin:6px 0;
  font-size:14px;
}

.modal-content h2{
  margin-top:0;
  font-size:26px;
}

.close{
  float:right;
  font-size:18px;
  padding:5px 8px;
  border-radius:50%;
}
.close:hover{
  background:#eee;
}

.atom{
  position: relative;
  width: 200px;
  height: 200px;
  margin: 10px auto;
}

.nucleus{
  position: absolute;
  top: 50%;
  left: 50%;
  width: 28px;
  height: 28px;
  background: #e53935;
  border-radius: 50%;
  transform: translate(-50%, -50%);
  color: #fff;
  font-size: 11px;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 2;
}

.orbit{
  position: absolute;
  top: 50%;
  left: 50%;
  border: 1px dashed #555;
  border-radius: 50%;
  transform: translate(-50%, -50%);
}

.electron{
  position: absolute;
  top: 50%;
  left: 50%;
  width: 8px;
  height: 8px;
  background: #1e88e5;
  border-radius: 50%;
}

.legend{
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(160px,1fr));
  gap: 8px;
  max-width: 900px;
  margin: 15px auto;
  font-size: 13px;
}

.legend-item{
  display: flex;
  align-items: center;
  gap: 6px;
}

.legend-color{
  width: 20px;
  height: 20px;
  border: 1px solid #333;
}


.lg-alkali{background:#ffb3b3}
.lg-alkaline{background:#ffd9b3}
.lg-transition{background:#ffffb3}
.lg-metalloid{background:#ccffcc}
.lg-nonmetal{background:#b3e5ff}
.lg-halogen{background:#b3ffff}
.lg-noble{background:#e1bee7}
.lg-lanth{background:#f8bbd0}
.lg-actin{background:#d1c4e9}
.lg-post-transition{background:#e2e2e2 ;}
.periodic{
  background:#ffffffcc;
  padding:15px;
  border-radius:15px;
  box-shadow:0 10px 25px rgba(0,0,0,0.1);
}
.group-header,
.period-header{
  background:transparent;
  border:none;
  box-shadow:none;
  font-weight:600;
  color:#444;
}
.group-header,
.period-header{
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:14px;
}

.period-header{
  background:#dfe6e9;
  font-weight:bold;
}

.group-header{
  background:#b2bec3;
  font-weight:bold;
}
.group-header,
.period-header{
  background: transparent !important;
  border: none !important;
  box-shadow: none !important;
}
#quiz-buttons{
  margin-top:30px;
  display:flex;
  justify-content:center;
  gap:20px;
}

#quiz-buttons button{
  padding:12px 20px;
  font-size:16px;
  font-weight:bold;
  border-radius:12px;
  border:none;
  cursor:pointer;
  transition:0.2s;
}

#quiz-buttons button:hover{
  transform:scale(1.05);
}


#quiz-buttons button:nth-child(1){
  background:#55efc4;
}

#quiz-buttons button:nth-child(2){
  background:#ffeaa7;
}

#quiz-buttons button:nth-child(3){
  background:#fab1a0;
}
#quiz-buttons button{
  padding:20px 32px;    
  font-size:20px;       
  font-weight:bold;
  border-radius:18px;   
  border:none;
  cursor:pointer;
  transition:0.2s;
  min-width:220px;      
}
#quiz-buttons button{
  box-shadow:0 6px 0 rgba(0,0,0,0.2);
}

#quiz-buttons button:active{
  transform:translateY(4px);
  box-shadow:0 2px 0 rgba(0,0,0,0.2);
}
.element-guide{
  display:flex;
  justify-content:center;
  align-items:center;
  gap:40px;
  margin:25px 0;
}

.guide-box{
  width:100px;
  height:110px;
  border:2px solid #333;
  border-radius:12px;
  background:#e2e2e2; /* ตรงกับ post-transition metal (Sn) */
  display:flex;
  flex-direction:column;
  justify-content:space-between;
  padding:6px;
  font-size:12px;
  box-shadow:0 6px 12px rgba(0,0,0,0.2);
}

.guide-box .sym{
  font-size:26px;
  font-weight:bold;
  text-align:center;
}

.guide-box .name{
  font-size:11px;
  text-align:center;
}

.guide-text{
  text-align:left;
  font-size:14px;
  line-height:1.6;
}
/* ====== Element Guide Section ====== */

.element-guide{
  width:100%;
  max-width:900px;
  margin:30px auto;
  padding:25px;
  background:linear-gradient(135deg,#ffffff,#f4f7ff);
  border-radius:20px;
  box-shadow:0 15px 35px rgba(0,0,0,0.1);
}

.guide-title{
  margin-top:0;
  margin-bottom:20px;
  font-size:24px;
  color:#2c3e50;
}

.guide-container{
  display:flex;
  justify-content:center;
  align-items:center;
  gap:60px;
  flex-wrap:wrap;
}

/* กล่องตัวอย่างธาตุ */
.guide-box{
  width:120px;
  height:130px;
  border-radius:15px;
  padding:8px;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
  font-size:13px;
  position:relative;
  transition:0.3s;
}

.guide-box:hover{
  transform:translateY(-8px);
  box-shadow:0 15px 25px rgba(0,0,0,0.25);
}

.guide-box .sym{
  font-size:32px;
  font-weight:bold;
  text-align:center;
}

.guide-box .name{
  font-size:12px;
  text-align:center;
}

/* คำอธิบายด้านขวา */
.guide-text{
  text-align:left;
  font-size:15px;
  line-height:2;
}

.guide-item{
  display:flex;
  align-items:center;
  gap:10px;
  margin-bottom:8px;
}

/* จุดนำหน้าข้อความ */
.dot{
  width:10px;
  height:10px;
  background:#636e72;
  border-radius:50%;
}
/* ===== Element Guide Advanced ===== */

.element-guide{
  max-width:700px;
  margin:40px auto;
  padding:30px;
  background:linear-gradient(135deg,#ffffff,#eef3ff);
  border-radius:20px;
  box-shadow:0 15px 35px rgba(0,0,0,0.1);
}

.guide-title{
  margin-top:0;
  margin-bottom:30px;
  font-size:24px;
  color:#2c3e50;
}

.guide-wrapper{
  position:relative;
  display:flex;
  justify-content:center;
  align-items:center;
}

/* กล่องตัวอย่าง */
.guide-box{
  width:130px;
  height:150px;
  border-radius:15px;
  padding:10px;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
  font-size:14px;
  position:relative;
  box-shadow:0 10px 20px rgba(0,0,0,0.2);
}

.guide-box .sym{
  font-size:36px;
  font-weight:bold;
  text-align:center;
}

.guide-box .name{
  font-size:13px;
  text-align:center;
}

/* กล่องข้อความลูกศร */
.guide-arrows{
  position:absolute;
  left:200px;
  top:0;
  width:300px;
}

/* ลูกศรแต่ละอัน */
.arrow{
  position:absolute;
  background:#2d3436;
  color:white;
  padding:6px 12px;
  border-radius:20px;
  font-size:14px;
}

/* เส้นลูกศร */
.arrow::after{
  content:"";
  position:absolute;
  left:-40px;
  top:50%;
  width:40px;
  height:2px;
  background:#2d3436;
}

.arrow::before{
  content:"";
  position:absolute;
  left:-8px;
  top:50%;
  transform:translateY(-50%);
  border-top:6px solid transparent;
  border-bottom:6px solid transparent;
  border-right:8px solid #2d3436;
}

/* จัดตำแหน่งให้ตรง */
.a1{ top:5px; }
.a2{ top:45px; }
.a3{ top:90px; }
.a4{ top:125px; }
</style>

const modal = document.getElementById("modal");
const modalBody = document.getElementById("modal-body");
const t = document.getElementById("table");
const empty=document.createElement("div");
t.appendChild(empty);

for(let g=1; g<=18; g++){
  const h=document.createElement("div");
  h.className="group-header";
  h.textContent=g;
  h.style.gridRow=1;
  h.style.gridColumn=g+1;
  t.appendChild(h);
}

for(let p=1; p<=7; p++){
  const ph=document.createElement("div");
  ph.className="period-header";
  ph.textContent=p;
  ph.style.gridRow=p+1;
  ph.style.gridColumn=1;
  t.appendChild(ph);
}


E.forEach(e=>{
  const d=document.createElement("div");
  d.className="el "+e.g;
 d.style.gridColumn=e.c + 1; 
d.style.gridRow=e.r + 1;    
  d.innerHTML=`
    <div class="no">${e.n}</div>
    <div class="sym">${e.s}</div>
    <div class="w">${e.w}</div>
    <div class="name">${e.nm}</div>`;
  d.onclick=()=>openModal(e);
  t.appendChild(d);
});

function openModal(e){
  const box = modal.querySelector(".modal-content");
  box.className = "modal-content " + e.g;

  const shells=[];
  let electrons=e.n;
  const maxShell=[2,8,18,32];

  for(let m of maxShell){
    if(electrons>0){
      shells.push(Math.min(m,electrons));
      electrons-=m;
    }
  }

  let orbitsHTML="";
  shells.forEach((count,i)=>{
    const size=60+i*35;
    let electronsHTML="";
    for(let j=0;j<count;j++){
      const angle=(360/count)*j;
      electronsHTML+=`
        <div class="electron" style="
          transform:
            translate(-50%,-50%)
            rotate(${angle}deg)
            translate(${size/2}px);
        "></div>`;
    }
    orbitsHTML+=`
      <div class="orbit" style="width:${size}px;height:${size}px">
        ${electronsHTML}
      </div>`;
  });

  modalBody.innerHTML=`
    <h2>${e.s}</h2>
    <div class="atom">
      <div class="nucleus">${e.n}</div>
      ${orbitsHTML}
    </div>
    <p><b>${e.nm}</b></p>
    <hr>
    <p><b>เลขอะตอม:</b> ${e.n}</p>
    <p><b>คาบ :</b> ${e.r}</p>
    <p><b>หมู่ :</b> ${e.c}</p>
    <p><b>มวลอะตอม:</b> ${e.w}</p>
    <p><b>เลขออกซิเดชัน:</b> ${e.ox}</p>
    <p><b>การจัดเรียงอิเล็กตรอน:</b> ${e.elec}</p>
  `;

  modal.style.display="flex";
}

function closeModal(){
  modal.style.display="none";
}
modal.onclick=e=>{
  if(e.target===modal) closeModal();
};


function goQuiz(type) {
  if (type === 1) {
    window.location.href = "quiz.html?type=pre";
  }
  if (type === 2) {
    window.location.href = "quiz.html?type=post";
  }
}
function saveScore(name, type, score) {
  fetch("https://script.google.com/macros/s/AKfycbyun42Idu747ru10Xdxh-fnterXn7J_S4VFWD8ReWSjzoHF6T65HoVrOQ1y-ofxhwuURA/exec", {
    method: "POST",
    body: JSON.stringify({
      name: name,
      type: type,
      score: score
    })
  })
  .then(res => console.log("บันทึกสำเร็จ"))
  .catch(err => console.error("เกิดข้อผิดพลาด"));
}
