<!DOCTYPE html>

  <style>
html, body {
  margin: 0;

}

body {

.quiz-container {
  width: 90%;

    h2 {

    }

    #choices button:hover {

    }

    .wrong {
      background: #e74c3c !important;

    .next-btn {
      width: 100%;

      font-size: 16px;
      border-radius: 10px;
      border: none;
      background: #2ecc71;

    .next-btn:hover {

    }

    #result {
      text-align: center;
      font-size: 18px;

    }

    .back-btn {
      display: block;
      margin: 20px auto 0;
      padding: 10px 20px;

      border: none;
      background: #95a5a6;
      color: white;

    }
    .mode-btn {
  width: 100%;
  padding: 14px;
  margin-bottom: 15px;
  font-size: 18px;
  border-radius: 12px;
  border: none;
  cursor: pointer;
  background: #3498db;
  color: white;
}
.choice-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
}

.choice-grid button {
  height: 120px;
  font-size: 20px;
}
.next-btn {
  align-self: center;
  width: 60%;
  font-size: 18px;
}
.back-btn {
  opacity: 0.7;
}

.mode-btn:hover {
  background: #2980b9;
}
/* พื้นหลังเกม */
body {
  background: linear-gradient(135deg, #667eea, #764ba2);
}

/* กล่องเกม */
.quiz-container {
  background: #ffffff;
}

/* คำถาม */

}

}

.choice-grid button:hover {
  transform: scale(1.05);
  box-shadow: 0 8px 15px rgba(0,0,0,0.2);
}

/* ตอบถูก / ผิด */

  background: #27ae60 !important;
}

.wrong {
  background: #c0392b !important;

}

/* ปุ่มถัดไป */
.next-btn {
  margin-top: 20px;

}
#game-screen {
  display: flex;

width: 100%;
}


/* HUD ด้านบน */

}

/* คำถามอยู่กลาง */
#quiz-box {

}

}

}

body {

/* ===== Form Design ===== */


.form-card {
  width: 100%;

.quiz-img{

<body>

<div class="quiz-container">

  <!-- หน้าเลือกควิซ -->
 <div id="start-screen">
  <h2>ควิซตารางธาตุ</h2>

  <div id="user-form" class="form-card">

  <div class="form-header">
    <h3>ลงทะเบียนก่อนทำควิซ</h3>
    <p>กรอกข้อมูลเพื่อเริ่มทำแบบทดสอบ</p>
  </div>

  <div class="input-group">
    <input type="text" id="studentName" placeholder="ชื่อ - นามสกุล">
  </div>

  <div class="input-group">
    <input type="email" id="studentEmail" placeholder="example@email.com">
  </div>

  <button class="save-btn" onclick="saveUser()">
    เริ่มทำควิซ
  </button>

</div>


  <div id="quiz-buttons" style="display:none;">
    <p id="welcomeText"></p>

    <button class="mode-btn" onclick="startQuiz('pre')">
      ควิซก่อนเรียน
    </button>

    <button class="mode-btn" onclick="startQuiz('post')">
      ควิซหลังเรียน
    </button>
  </div>
</div>


  <!-- หน้าเกม -->
  <div id="game-screen" style="display:none;">
    <h2 id="quiz-title"></h2>

    <div class="game-hud">
      <span id="level">ข้อที่ 1</span>
      <span id="score">คะแนน: 0</span>
    </div>

    <div class="progress-bar">
      <div class="progress" id="progress"></div>
    </div>

    <div id="quiz-box">
      <p id="question"></p>
      <div id="choices" class="choice-grid"></div>
      <button class="next-btn" onclick="nextQuestion()">ถัดไป</button>
    </div>

    <p id="result"></p>

    <a href="index.html">
      <button class="back-btn">กลับสู่ตารางธาตุ</button>
    </a>
  </div>

</div>

<script>
    let quizType = "";
let index = 0;
let score = 0;

  // ===== ข้อมูลควิซ =====
  const quizzes = {
    pre: [
      {
        question: "P ในตารางธาตุหมายถึงข้อใด",
        choices: ["ฟอสฟอรัส", "แคลเซียม", "โซเดียม","แมกนีเซียม"],
        answer: "ฟอสฟอรัส"
      },
      {
        question: "ข้อใดประกอบด้วยธาตุที่เป็นอโลหะทั้งหมด",
        choices: ["Li Ra C Cl", "O Mg In Fe", "He I Zn C","S F O Br"],
        answer: "S F O Br"
      },
       {
        question: "เลขมวลของธาตุ N มีค่าเท่าใด",
        choices: ["7", "12", "14","16"],
        answer: "14"
      },
       {
        question: "ธาตุ Mg จัดเป็นธาตุในกลุ่มใด",
        choices: ["Non-metal", "Alkali Metal", "Alkali Earth Metal","Noble gas"],
        answer: "Alkali Earth Metal"
      },
       {
        question: "ข้อใดจัดเป็นโลหะทรานซิชันทั้งหมด",
        choices: ["Sn Sb Te Po", "Sc Ti Cu Zn", "Ga Sr Bi Al","Co Ni Tl Xe"],
        answer: "Sc Ti Cu Zn"
      },
       {
        question: "ในการวิเคราะห์เลขออกซิเดชันของธาตุชนิดหนึ่ง พบว่ามีเลขออกซิเดชันเป็น +1 ธาตุนั้นควรเป็นธาตุใด",
        choices: ["Rb", "Be", "F","Ne"],
        answer: "Rb"
      },
       {
        question: "ธาตุ Og มีเลขอะตอมเป็นเท่าใด",
        choices: ["72", "84", "98","118"],
        answer: "118"
      },
       {
        question: "ข้อใดต่อไปนี้ไม่ถูกต้อง",
        choices: ["ธาตุโซเดียม จัดเป็น Alkali Metal", "ธาตุโบรอน จัดเป็น Metalloid", "ธาตุคลอรีน จัดเป็น Halogen","ธาตุซิลิกอน จัดเป็น Transition Metal"],
        answer: "ธาตุซิลิกอน จัดเป็น Transition Metal"
      },
       {
        question: "จากข้อมุลในตารางธาตุ ข้อใดมีสมบัติเป็นโลหะทุกธาตุ", //เพิ่มรูปด้วย
        image: "pre.png",
        choices: ["A และ B", "A และ D", "A,B และ D","A,C และ D"],
        answer: "A,C และ D"
      },{
        question: "ธาตุที่มีเลขอะตอมเท่ากับ 85 คือธาตุใด",
        choices: ["Bi", "Po", "At","Rn"],
        answer: "At"
      }
    ],
    post: [
      {
        question: "แมกนีเซียมมีสัญลักษณ์ธาตุคืออะไร",
        choices: ["Ca", "P", "Mg","Na"],
        answer: "Mg"
      },
      {
        question: "ธาตุ He O N Br จัดอยู่ในกลุ่มเดียวกันคือกลุ่มใด",
        choices: ["Non-metal", "Metalloid", "Halogen","Noble gas"],
        answer: "Non-metal"
      },
      {
        question: "เลขมวลของธาตุใดมีค่าเท่ากับ 14",
        choices: ["Li", "C", "Be","N"],
        answer: "N"
      },
      {
        question: "ธาตุ Sb จัดเป็นธาตุในกลุ่มใด",
        choices: ["Alkali metal", "Transition metal", "Metalloid","Actinide"],
        answer: "Metalloid"
      },
      {
        question: "ข้อใดเป็นก๊าซมีตระกูล(Noble gas) ทั้งหมด",
        choices: ["H Rb Cs Fr", "B Si As Te", "Se Ti V Mn","Ne Kr Xe Rn"],
        answer: "Ne Kr Xe Rn"
      },
      {
        question: "ในการวิเคราะห์เลขออกซิเดชันของธาตุชนิดหนึ่ง พบว่ามีเลขออกซิเดชันเป็น -1 เท่านั้น ธาตุนั้นควรเป็นธาตุใด",
        choices: ["N", "F", "I","O"],
        answer: "F"
      },
      {
        question: "ธาตุ X มีเลขอะตอมเท่ากับ 118 ธาตุนั้นคือธาตุใด",
        choices: ["Og", "At", "Hg","Ta"],
        answer: "Og"
      },
      {
        question: "ข้อใดต่อไปนี้ถูกต้อง",
        choices: ["ธาตุซีเซียม จัดเป็น Alkali earth metal", "ธาตุแบเรียม จัดเป็น Metalloid", "ธาตุไอโอดีน จัดเป็น Halogen","ธาตุนิกเกิล จัดเป็น Noble gas"],
        answer: "ธาตุไอโอดีน จัดเป็น Halogen"
      },
       {
        question: "จากข้อมูลในตารางธาตุ ข้อใดมีสมบัติเป็นอโลหะทุกธาตุ",//เพิ่มรูปม
        image: "post.png",
        choices: ["A และ B", "A และ D", "A,B และ D","A,C และ D"],
        answer: "A,C และ D"
      },
       {
        question: "ธาตุที่มีเลขอะตอมเท่ากับ 29 คือธาตุใด",
        choices: ["Ni", "Cu", "Zn","Ga"],
        answer: "Cu"
      },
    ]
  };
function showQuestion() {
  const q = quizzes[quizType][index];

  const questionEl = document.getElementById("question");

  questionEl.innerHTML = `
    ${q.image ? `<img src="${q.image}" class="quiz-img">` : ""}
    ${q.question}
  `;

  document.getElementById("level").textContent = `ข้อที่ ${index + 1}`;
  document.getElementById("score").textContent = `คะแนน: ${score}`;

  document.getElementById("progress").style.width =
    ((index + 1) / quizzes[quizType].length) * 100 + "%";

  const choicesDiv = document.getElementById("choices");
  choicesDiv.innerHTML = "";

  q.choices.forEach(c => {
    const btn = document.createElement("button");
    btn.textContent = c;
    btn.onclick = () => checkAnswer(btn, c, q.answer);
    choicesDiv.appendChild(btn);
  });

  document.querySelector(".next-btn").disabled = true;
}


  function checkAnswer(button, choice, answer) {
  const buttons = document.querySelectorAll("#choices button");
  buttons.forEach(b => b.disabled = true);

  if (choice === answer) {
    score += 1;
    button.classList.add("correct");
  } else {
    button.classList.add("wrong");

    // ไฮไลต์คำตอบที่ถูก
    buttons.forEach(b => {
      if (b.textContent === answer) {
        b.classList.add("correct");
      }
    });
  }
document.querySelector(".next-btn").disabled = false;
  document.getElementById("score").textContent = `คะแนน: ${score}`;
}


function startQuiz(type) {
  quizType = type;
  index = 0;
  score = 0;

  document.getElementById("start-screen").style.display = "none";
  document.getElementById("game-screen").style.display = "block";

  document.getElementById("quiz-title").textContent =
    type === "pre" ? " ควิซก่อนเรียน" : "ควิซหลังเรียน";

  showQuestion();
}



function showSummary() {
  const pre = JSON.parse(localStorage.getItem("preResult"));
  const post = JSON.parse(localStorage.getItem("postResult"));

  let summary = "";

  if (pre) {
    summary += `ก่อนเรียน: ${pre.score} / ${pre.total}<br>`;
  }
  if (post) {
    summary += `หลังเรียน: ${post.score} / ${post.total}<br>`;
  }

  if (pre && post) {
    const diff = post.score - pre.score;
    summary += `<br>พัฒนาการ: +${diff} คะแนน`;
  }

  document.getElementById("result").innerHTML = summary;
}

function nextQuestion() {
  index++;

  if (index < quizzes[quizType].length) {
    showQuestion();
  } else {

    sendToExcel(quizType, score);

    document.getElementById("quiz-box").style.display = "none";
    document.getElementById("result").innerHTML = `
      🎉 จบเกมแล้ว!<br><br>
      คะแนนของคุณ<br>
      <span style="font-size:32px;color:#9b59b6;">
        ${score}
      </span> คะแนน
    `;
  }
}


function showQuizButtons(name) {

  document.getElementById("user-form").style.display = "none";
  document.getElementById("quiz-buttons").style.display = "block";

  document.getElementById("welcomeText").innerHTML =
    " Hello! " + name;
}
function sendToExcel(type, score) {

  fetch("http://localhost:3000/save", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      name: studentName,
      email: studentEmail,
      quizType: type,
      score: score,
      total: quizzes[type].length * 1
    })
  })
  .then(res => console.log("บันทึกสำเร็จ"))
  .catch(err => console.log("เกิดข้อผิดพลาด", err));
}
let studentName = "";
let studentEmail = "";

function saveUser() {
  const nameInput = document.getElementById("studentName").value.trim();
  const emailInput = document.getElementById("studentEmail").value.trim();

  if (!nameInput || !emailInput) {
    alert("กรุณากรอกชื่อและอีเมลให้ครบ");
    return;
  }

  studentName = nameInput;
  studentEmail = emailInput;

  showQuizButtons(studentName);
}
questionElement.innerHTML = `
  <p>${currentQuestion.question}</p>
  ${currentQuestion.image ? `<img src="${currentQuestion.image}" class="quiz-img">` : ""}
`;
</script>

</body>
